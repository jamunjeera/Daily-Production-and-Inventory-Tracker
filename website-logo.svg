<svg viewBox="0 0 980 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daily Production and Inventory Tracker">
  <defs>
    <linearGradient id="goldDpt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="45%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#9E6410"/>
    </linearGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0.91  0 1 0 0 0.63  0 0 1 0 0.13  0 0 0 0.45 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(6,18)">
    <rect x="0" y="0" width="124" height="124" rx="30" fill="#0f0d0b"/>
    <rect x="2" y="2" width="120" height="120" rx="28" fill="none" stroke="rgba(232,160,32,0.60)" stroke-width="3"/>
    <path d="M28 76 A46 46 0 1 1 94 43" fill="none" stroke="url(#goldDpt)" stroke-width="9" stroke-linecap="round" filter="url(#goldGlow)"/>
    <rect x="40" y="68" width="10" height="32" rx="3" fill="url(#goldDpt)"/>
    <rect x="57" y="55" width="10" height="45" rx="3" fill="url(#goldDpt)"/>
    <rect x="74" y="42" width="10" height="58" rx="3" fill="url(#goldDpt)"/>
    <path d="M32 95 C50 82 66 70 90 50" fill="none" stroke="url(#goldDpt)" stroke-width="9" stroke-linecap="round"/>
    <path d="M90 50 L82 49 L88 58 Z" fill="url(#goldDpt)"/>
  </g>
  <g transform="translate(160,45)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" letter-spacing="3" fill="#F7EFE2">DAILY PRODUCTION</text>
    <text x="0" y="45" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="5" fill="url(#goldDpt)">AND INVENTORY TRACKER</text>
    <line x1="0" y1="64" x2="650" y2="64" stroke="rgba(232,160,32,0.45)" stroke-width="2"/>
  </g>
</svg>